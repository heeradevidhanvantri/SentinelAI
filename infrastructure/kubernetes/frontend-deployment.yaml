apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelai-frontend
  namespace: sentinelai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinelai-frontend
  template:
    metadata:
      labels:
        app: sentinelai-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/sentinelai/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.sentinelai.io"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sentinelai-frontend
  namespace: sentinelai
spec:
  selector:
    app: sentinelai-frontend
  ports:
    - port: 80
      targetPort: 3000
