apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentinelai-ingress
  namespace: sentinelai
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - sentinelai.io
        - api.sentinelai.io
      secretName: sentinelai-tls
  rules:
    - host: sentinelai.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sentinelai-frontend
                port:
                  number: 80
    - host: api.sentinelai.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sentinelai-api
                port:
                  number: 80
