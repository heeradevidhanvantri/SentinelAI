apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelai-api
  namespace: sentinelai
  labels:
    app: sentinelai-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sentinelai-api
  template:
    metadata:
      labels:
        app: sentinelai-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/api/v1/metrics"
    spec:
      containers:
        - name: api
          image: ghcr.io/sentinelai/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: sentinelai-secrets
            - configMapRef:
                name: sentinelai-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sentinelai-api
  namespace: sentinelai
spec:
  selector:
    app: sentinelai-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sentinelai-api-hpa
  namespace: sentinelai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sentinelai-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
