global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sentinelai-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /api/v1/metrics

  - job_name: sentinelai-celery
    static_configs:
      - targets: ["celery-worker:9090"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
