[pytest]
testpaths = backend/tests
asyncio_mode = auto
pythonpath = backend
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
markers =
    integration: tests requiring running infrastructure (Redis, Kafka, Docker)
    slow: tests that take longer than a few seconds
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

[coverage:run]
source = backend/app
omit =
    backend/tests/*
    backend/app/__init__.py

[coverage:report]
show_missing = true
skip_covered = false
